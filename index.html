    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafrex/spa-github-pages
        (function (l) {
            if (l.search && l.search[1] === '/') {
                const decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>

<body>
    <div id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column;">
            <div class="spinner-border text-danger" role="status">
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <style>
        #blazor-error-ui {
            z-index: 99998 !important;
            bottom: 60px !important; /* Move it up so it doesn't cover the force reload button if both show */
        }
    </style>

    <script type="text/javascript">
        function displayGlobalError(prefix, content, color, bg) {
            // Avoid duplicates
            if (document.querySelector('[data-error-content="' + btoa(content.substring(0, 100)) + '"]')) return;

            const errorDiv = document.createElement('div');
            errorDiv.setAttribute('data-error-content', btoa(content.substring(0, 100)));
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = bg || 'black';
            errorDiv.style.color = color || 'white';
            errorDiv.style.zIndex = '100000';
            errorDiv.style.padding = '15px';
            errorDiv.style.fontSize = '11px';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.wordBreak = 'break-all';
            errorDiv.style.whiteSpace = 'pre-wrap';
            const fullErrorText = prefix + '\n' + content + '\n\nUA: ' + navigator.userAgent;
            errorDiv.innerHTML = '<strong>' + prefix + '</strong> (Click to copy)\n' + content + '\n\nUA: ' + navigator.userAgent;
            
            errorDiv.onclick = function() {
                const textArea = document.createElement("textarea");
                textArea.value = fullErrorText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const originalBg = errorDiv.style.background;
                    errorDiv.style.background = '#4CAF50';
                    setTimeout(() => { errorDiv.style.background = originalBg; }, 500);
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                document.body.removeChild(textArea);
                
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(fullErrorText).catch(e => {});
                }
            };

            if (document.body) {
                document.body.appendChild(errorDiv);
                addForceReloadButton();
            } else {
                // If body not ready, try again in a bit
                setTimeout(function() { 
                    if (document.body) {
                        document.body.appendChild(errorDiv);
                        addForceReloadButton();
                    }
                }, 500);
            }
        }

        function addForceReloadButton() {
            if (document.getElementById('force-reload-btn')) return;
            const btn = document.createElement('button');
            btn.id = 'force-reload-btn';
            btn.innerHTML = 'FORCE CACHE CLEAR & RELOAD';
            btn.style.position = 'fixed';
            btn.style.bottom = '20px';
            btn.style.left = '20px';
            btn.style.right = '20px';
            btn.style.padding = '20px';
            btn.style.background = 'yellow';
            btn.style.color = 'black';
            btn.style.fontWeight = 'bold';
            btn.style.zIndex = '100001';
            btn.onclick = function() {
                window.location.reload(true);
            };
            document.body.appendChild(btn);
        }

        // Intercept console.error to catch Blazor Critical errors that don't bubble to window.onerror
        (function() {
            const originalError = console.error;
            console.error = function() {
                const args = Array.from(arguments);
                const message = args.join(' ');
                
                if (message.includes('crit:') || message.includes('Unhandled exception') || message.includes('InvalidCharacterError')) {
                    displayGlobalError('BLAZOR CRITICAL', message, 'white', 'darkred');
                }
                
                originalError.apply(console, arguments);
            };
        })();

        window.onerror = function (message, source, lineno, colno, error) {
            // Ignore generic cross-origin script errors which are usually from extensions or trackers
            if (message === 'Script error.' && (!source || source === ':0:0')) {
                console.warn('Ignored cross-origin script error.');
                return;
            }

            displayGlobalError('JS ERROR', message + '\nAt: ' + source + ':' + lineno + ':' + colno + '\nStack: ' + (error ? error.stack : 'N/A'), 'lime', 'black');
        };

        window.addEventListener('unhandledrejection', function (event) {
            displayGlobalError('PROMISE REJECTION', event.reason + '\nStack: ' + (event.reason ? event.reason.stack : 'N/A'), 'white', 'darkred');
        });
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/Sortable.min.js"></script>
    <script src="js/panzoom.min.js"></script>
    <script src="js/site.js?v=21"></script>
    <script>
        window.initScorecardZoom = (elementId) => {
            const el = document.getElementById(elementId);
            if (!el) return;
            
            // Disable native browser touch scrolling so panzoom can capture pinch/drag gestures
            el.style.touchAction = 'none';
            if (el.parentElement) {
                el.parentElement.style.touchAction = 'none';
                el.parentElement.style.overflow = 'hidden';
                // Force wrapper to not exceed screen height/width so panzoom handles all movement
                el.parentElement.style.maxHeight = '85vh';
                el.parentElement.style.width = '100%';
            }
            
            // Calculate initial zoom to fit width on mobile
            let startZoom = 1.0;
            if (window.innerWidth < 1250) {
                startZoom = window.innerWidth / 1260; // Slightly smaller than actual width to give a tiny margin
            }
            
            panzoom(el, {
                maxZoom: 5,
                minZoom: 0.2,
                bounds: true,
                boundsPadding: 0.1,
                initialZoom: startZoom,
                initialX: 0,
                initialY: 0,
                onTouch: function(e) {
                    // Prevent default to ensure panning works
                    if (e.touches.length > 1) {
                        e.preventDefault();
                    }
                    return false; 
                }
            });
        };
        
        window.lastMouseEnterType = 'none';
        
        // Comprehensive global event management to avoid needing attributes in Razor files
        const dragTargets = '.reorderable-row, .defense-container, .player-overlay, .bench-container, .bench-player-name, .pos-abbr, .pos-num, .player-select-cell';
        
        document.addEventListener('dragover', function (e) {
            if (e.target.closest(dragTargets)) {
                e.preventDefault();
                if (e.dataTransfer) {
                    e.dataTransfer.dropEffect = 'move';
                }
            }
        }, true);

        document.addEventListener('dragenter', function (e) {
            if (e.target.closest(dragTargets)) {
                e.preventDefault();
            }
        }, true);

        document.addEventListener('drop', function (e) {
            if (e.target.closest(dragTargets)) {
                e.preventDefault();
            }
        }, true);

        window.getLastMouseEnterType = function() {
            return window.lastMouseEnterType;
        };
    </script>
</body>
