<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafrex/spa-github-pages
        (function (l) {
            if (l.search && l.search.startsWith('?/')) {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isotopes Stats</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link href="css/site.css" rel="stylesheet" />
    <link href="Website.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJyBmaWxsPSdub25lJyBzdHJva2U9JyNFRDFDMjQnIHN0cm9rZS13aWR0aD0nOCc+PGNpcmNsZSBjeD0nNTAnIGN5PSc1MCcgcj0nOCcgZmlsbD0nI0VEMUMyNCcgc3Ryb2tlPSdub25lJy8+PGVsbGlwc2UgY3g9JzUwJyBjeT0nNTAnIHJ4PSc0NScgcnk9JzE1Jy8+PGVsbGlwc2UgY3g9JzUwJyBjeT0nNTAnIHJ4PSc0NScgcnk9JzE1JyB0cmFuc2Zvcm09J3JvdGF0ZSg2MCA1MCA1MCknLz48ZWxsaXBzZSBjeD0nNTAnIGN5PSc1MCcgcng9JzQ1JyByeT0nMTUnIHRyYW5zZm9ybT0ncm90YXRlKDEyMCA1MCA1MCknLz48L3N2Zz4=" />
    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // https://github.com/rafrex/spa-github-pages
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, -1) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->
</head>
<body>
    <div id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column;">
            <div class="spinner-border text-danger" role="status">
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script type="text/javascript">
        window.onerror = function (message, source, lineno, colno, error) {
            var errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = 'black';
            errorDiv.style.color = 'lime';
            errorDiv.style.zIndex = '99999';
            errorDiv.style.padding = '10px';
            errorDiv.style.fontSize = '12px';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.wordBreak = 'break-all';
            errorDiv.style.whiteSpace = 'pre-wrap';
            errorDiv.innerHTML = 'JS ERROR: ' + message + '\nAt: ' + source + ':' + lineno + ':' + colno + '\nStack: ' + (error ? error.stack : 'N/A');
            document.body.appendChild(errorDiv);
        };

        window.addEventListener('unhandledrejection', function (event) {
            var errorDiv = document.createElement('div');
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '0';
            errorDiv.style.left = '0';
            errorDiv.style.width = '100%';
            errorDiv.style.background = 'darkred';
            errorDiv.style.color = 'white';
            errorDiv.style.zIndex = '99999';
            errorDiv.style.padding = '10px';
            errorDiv.style.fontSize = '12px';
            errorDiv.style.fontFamily = 'monospace';
            errorDiv.style.wordBreak = 'break-all';
            errorDiv.style.whiteSpace = 'pre-wrap';
            errorDiv.innerHTML = 'PROMISE REJECTION: ' + event.reason + '\nStack: ' + (event.reason ? event.reason.stack : 'N/A');
            document.body.appendChild(errorDiv);
        });
    </script>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="js/site.js?v=3"></script>
    <script>
        document.addEventListener('dragover', function (e) {
            if (e.target.closest('.reorderable-row')) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
